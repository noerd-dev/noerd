- title: Setup
  name: setup
  hidden: true
  route: setup
  block_menus:
    - title: Administration
      navigations:
        - title: Tenant
          route: tenant
          heroicon: building-office
        - title: Apps
          route: tenant-apps
          heroicon: squares-2x2
          superAdmin: true
          config: noerd.features.multi_tenant
        - title: Users
          route: users
          heroicon: users
        - title: User Roles
          route: user-roles
          heroicon: shield-check
          config: noerd.features.roles
        - title: Languages
          route: setup-languages
          heroicon: language
        - title: System Settings
          route: system-settings
          heroicon: cog-6-tooth
        - title: Collection Definitions
          route: setup-collection-definitions
          heroicon: rectangle-stack
          config: noerd.collections.show_definitions_ui
    - title: Data Management
      dynamic: setup-collections
